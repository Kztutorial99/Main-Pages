<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Kz.tutorial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: rgba(255,255,255,.08);
      --text: #e8eaf0;
      --muted: #8a8da8;
      --accent: #0ea5e9;
      --gold: #f59e0b;
      --green: #22c55e;
      --red: #ef4444;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }

    /* LOGIN */
    .login-wrap { width: 100%; max-width: 380px; }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem 2rem; text-align: center;
    }
    .login-logo { display: flex; align-items: center; justify-content: center; gap: .6rem; margin-bottom: 1.5rem; }
    .login-logo img { width: 36px; height: 36px; border-radius: 50%; }
    .login-logo span { font-weight: 700; font-size: 1.1rem; }
    .login-logo .accent { color: var(--accent); }
    .login-title { font-size: 1.1rem; font-weight: 600; margin-bottom: .4rem; }
    .login-sub { font-size: .8rem; color: var(--muted); margin-bottom: 1.8rem; }
    .input-wrap { position: relative; margin-bottom: 1rem; }
    .input-wrap input {
      width: 100%; padding: .75rem 1rem; padding-right: 3rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: .95rem;
      outline: none; letter-spacing: .2em; font-family: 'Inter', sans-serif;
      transition: border-color .2s;
    }
    .input-wrap input:focus { border-color: var(--accent); }
    .input-wrap .toggle-pw {
      position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      display: flex; align-items: center;
    }
    .btn-login {
      width: 100%; padding: .75rem; background: var(--accent); color: #fff;
      border: none; border-radius: 12px; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: filter .2s;
    }
    .btn-login:hover { filter: brightness(1.1); }
    .login-err { color: var(--red); font-size: .8rem; margin-top: .75rem; min-height: 1.2em; }

    /* DASHBOARD */
    .dash { width: 100%; max-width: 700px; display: none; }
    .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: .75rem; }
    .dash-header h1 { font-size: 1.2rem; font-weight: 700; }
    .btn-logout { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: .45rem .9rem; border-radius: 8px; cursor: pointer; font-size: .8rem; }
    .btn-logout:hover { color: var(--red); border-color: var(--red); }

    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    @media (max-width: 500px) { .cards { grid-template-columns: 1fr 1fr; } }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.2rem 1rem; text-align: center;
    }
    .card-val { font-size: 2rem; font-weight: 700; line-height: 1; }
    .card-val.gold { color: var(--gold); }
    .card-val.blue { color: var(--accent); }
    .card-label { font-size: .72rem; color: var(--muted); margin-top: .4rem; text-transform: uppercase; letter-spacing: .08em; }

    .dist-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
    .dist-title { font-size: .85rem; font-weight: 600; margin-bottom: 1.2rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .dist-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .65rem; }
    .dist-label { font-size: .82rem; color: var(--muted); width: 40px; text-align: right; flex-shrink: 0; }
    .dist-bar-wrap { flex: 1; background: var(--surface2); border-radius: 99px; height: 8px; overflow: hidden; }
    .dist-bar { height: 100%; background: var(--gold); border-radius: 99px; transition: width .6s ease; }
    .dist-count { font-size: .78rem; color: var(--muted); width: 36px; text-align: right; flex-shrink: 0; }

    .stars-display { display: flex; gap: .2rem; justify-content: center; margin: .5rem 0; }
    .stars-display svg { width: 20px; height: 20px; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="iwx-team.webp" alt="IWX Team" />
        <span>IWX <span class="accent">TEAM</span></span>
      </div>
      <p class="login-title">Admin Dashboard</p>
      <p class="login-sub">Masukkan password untuk mengakses statistik</p>
      <div class="input-wrap">
        <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password" />
        <button class="toggle-pw" id="togglePw" tabindex="-1" aria-label="Tampilkan password">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button class="btn-login" id="btnLogin">Masuk</button>
      <p class="login-err" id="loginErr"></p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dash" id="dash">
    <div class="dash-header">
      <h1>📊 Statistik Rating</h1>
      <button class="btn-logout" id="btnLogout">Keluar</button>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-val gold" id="dAvg">—</div>
        <div class="stars-display" id="dStars"></div>
        <div class="card-label">Rata-rata</div>
      </div>
      <div class="card">
        <div class="card-val blue" id="dCount">—</div>
        <div class="card-label">Total Penilaian</div>
      </div>
      <div class="card">
        <div class="card-val" id="dTop">—</div>
        <div class="card-label">Bintang Terbanyak</div>
      </div>
    </div>

    <div class="dist-wrap">
      <p class="dist-title">Distribusi Bintang</p>
      <div id="distRows"></div>
    </div>
  </div>

  <script>
  const loginWrap = document.getElementById('loginWrap');
  const dash      = document.getElementById('dash');
  const pwInput   = document.getElementById('pwInput');
  const btnLogin  = document.getElementById('btnLogin');
  const loginErr  = document.getElementById('loginErr');
  const togglePw  = document.getElementById('togglePw');

  togglePw.addEventListener('click', () => {
    pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
  });

  function renderDash(data) {
    loginWrap.style.display = 'none';
    dash.style.display = 'block';
    document.getElementById('dAvg').textContent   = data.count > 0 ? data.avg.toFixed(1) : '—';
    document.getElementById('dCount').textContent = data.count;

    const starsEl = document.getElementById('dStars');
    const avg = data.avg || 0;
    starsEl.innerHTML = [1,2,3,4,5].map(i => {
      const filled = avg >= i ? '#f59e0b' : (avg >= i - 0.5 ? 'url(#hg)' : 'none');
      return `<svg viewBox="0 0 24 24" fill="${filled}" stroke="#f59e0b" stroke-width="1.8"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>`;
    }).join('');

    const dist = data.dist || {};
    const max  = Math.max(1, ...Object.values(dist));
    let topStar = '—', topCount = 0;
    [5,4,3,2,1].forEach(s => { if ((dist[s]||0) > topCount) { topCount = dist[s]; topStar = s + ' ★'; } });
    document.getElementById('dTop').textContent = topStar;

    const rows = document.getElementById('distRows');
    rows.innerHTML = [5,4,3,2,1].map(s => {
      const cnt = dist[s] || 0;
      const pct = max > 0 ? (cnt / max * 100).toFixed(1) : 0;
      return `<div class="dist-row">
        <span class="dist-label">${s} ★</span>
        <div class="dist-bar-wrap"><div class="dist-bar" style="width:${pct}%"></div></div>
        <span class="dist-count">${cnt}</span>
      </div>`;
    }).join('');
  }

  function doLogin() {
    const pw = pwInput.value.trim();
    if (!pw) { loginErr.textContent = 'Masukkan password terlebih dahulu.'; return; }
    btnLogin.disabled = true;
    btnLogin.textContent = 'Memverifikasi…';
    fetch('/api/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    })
    .then(r => r.json())
    .then(d => {
      if (d.error) {
        loginErr.textContent = d.error === 'Password salah' ? 'Password salah. Coba lagi.' : 'Terjadi kesalahan.';
        btnLogin.disabled = false;
        btnLogin.textContent = 'Masuk';
        pwInput.value = '';
        pwInput.focus();
      } else {
        renderDash(d);
      }
    })
    .catch(() => {
      loginErr.textContent = 'Gagal terhubung ke server.';
      btnLogin.disabled = false;
      btnLogin.textContent = 'Masuk';
    });
  }

  btnLogin.addEventListener('click', doLogin);
  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  document.getElementById('btnLogout').addEventListener('click', () => {
    dash.style.display = 'none';
    loginWrap.style.display = 'block';
    pwInput.value = '';
    loginErr.textContent = '';
    btnLogin.disabled = false;
    btnLogin.textContent = 'Masuk';
  });
  </script>
</body>
</html>
